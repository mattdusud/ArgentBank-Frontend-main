swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      #produces:
       # - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /userAccount/currentMonth:
    get:
      security:
        - Bearer: []
      tags:
        - User account Module
      summary: User Account API
      description:  API for fetching a user's bank account for the current month
      #produces:
       # - application/json
      responses:
        '200':
          description: Current month transactions retrieved successully
          schema:
            $ref: '#/definitions/TransactionsListAPIResponse'
        '401':
          description: Authentication error
        '418':
          description: I'm a teapot, Protection from bots
        '500':
          description: Internal Server Error
  # /userAccount/month/{month}:
  #   get:
  #     security:
  #       - Bearer: []
  #     tags:
  #       - User account Module
  #     summary: User Account API
  #     parameters:
  #       - in: path
  #         name: month
  #         schema:
  #         type: string
  #         required: true
  #         description: Month to retrieve
  #     description:  API for fetching a user's bank account for a specific month
  #     #produces:
  #      # - application/json
  #     responses:
  #       '200':
  #         description: Month transactions retrieved successully
  #         schema:
  #           $ref: '#/definitions/TransactionsListAPIResponse'
  #       '400':
  #         description: Invalid Fields
  #       '418':
  #         description: I'm a teapot, Protection from bots
  #       '500':
  #         description: Internal Server Error
  /userAccount/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - User account Module
      summary: User Transactions API
      parameters:
        - in: path
          name: transactionId
          schema:
          type: string
          required: true
          description: Transaction's Id to retrieve
      description: API for fetching a user transaction
      #produces:
       # - application/json
      responses:
        '200':
          description: User transaction retrieved successully
          schema:
            $ref: '#/definitions/TransactionsAPIResponse'
        '401':
          description: Authentication error
        '403':
          description: Forbidden User
        '404':
          description: Transaction Not Found
        '418':
          description: I'm a teapot, Protection from bots
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User account Module
      summary: User transactions API
      description: API for updating a user transaction
      parameters:
        - in: path
          name: transactionId
          type: string
          required: true
          description: Transaction's Id to retrieve
        - in: body
          name: body
          description: Update transaction attributes
          required: true
          schema:
            $ref: '#/definitions/UserTransaction'
      produces:
        - application/json
      responses:
        '200':
          description: User transaction retrieved successully
          schema:
            $ref: '#/definitions/TransactionsAPIResponse'
        '400':
          description: Invalid Fields
        '401':
          description: Authentication Error
        '403':
          description: Forbidden User
        '404':
          description: Transaction not found
        '418':
          description: I'm a teapot, Protection from bots
        '500':
          description: Internal Server Error
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  User:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
      userName:
        type: string
        description: user public name
  Login:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      userName:
        type: string
  UserTransaction:
    type: object
    properties:
      category:
        type: string
      note:
        type: string
  TransactionsListAPIResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              description: Transaction ID
            accountNumber:
              type: string
              description: Account number
            date:
              type: string
              description: Transaction date
            description:
              type: string
              description: Transaction description
            type:
              type: string
              description: Transaction type
            category:
              type: string
              description: Transaction category
            note:
              type: string
              description: Transaction note
            amount:
              type: number
              description: Transaction amount
            balance:
              type: number
              description: balance after transaction
  TransactionsAPIResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              description: Transaction ID